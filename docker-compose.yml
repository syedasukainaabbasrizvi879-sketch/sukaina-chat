```yaml
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sukaina
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sukaina_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://sukaina:password@postgres:5432/sukaina_chat?sslmode=disable
      PORT: 8080
    depends_on:
      - postgres

volumes:
  postgres_data:
```

